const HOSPITAL_NAME = "花蓮慈濟醫院";
const DEPT_NAME = "總務室 環管股";

const ROOMS = [
  { id: "room1", name: "第一會議室", icon: "🏛", color: "#1565c0", light: "#e3f2fd" },
  { id: "room2", name: "二期講堂",   icon: "🎓", color: "#6a1b9a", light: "#f3e5f5" },
  { id: "room3", name: "合心會議室", icon: "🤝", color: "#2e7d32", light: "#e8f5e9" },
  { id: "room4", name: "和氣會議室", icon: "☮",  color: "#e65100", light: "#fff3e0" },
  { id: "room5", name: "協力講堂",   icon: "💪", color: "#00695c", light: "#e0f2f1" },
  { id: "room6", name: "互愛會議室", icon: "❤",  color: "#c62828", light: "#ffebee" },
  { id: "room7", name: "貴賓室",     icon: "⭐", color: "#827717", light: "#f9fbe7" },
];

const todayStr = () => new Date().toISOString().slice(0, 10);
const getRoomById = (id) => ROOMS.find((r) => r.id === id) || ROOMS[0];
const formatDate = (s) => {
  if (!s) return "";
  const [y, m, d] = s.split("-");
  const dow = ["日","一","二","三","四","五","六"][new Date(s).getDay()];
  return `${y}/${parseInt(m)}/${parseInt(d)}（週${dow}）`;
};
function qrUrl(roomId) {
  const base = typeof window !== "undefined" ? window.location.href.split("?")[0].split("#")[0] : "";
  return `https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=8&data=${encodeURIComponent(base + "?room=" + roomId)}`;
}
function getTimeStatus(timeStr) {
  try {
    // 支援「09:30 - 17:30」和「09:30-17:30」兩種格式
    const normalized = timeStr.replace(/\s*-\s*/, " - ");
    const [start, end] = normalized.split(" - ");
    const nm = new Date().getHours() * 60 + new Date().getMinutes();
    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);
    if (nm >= sh*60+sm && nm < eh*60+em) return "using";
    if (nm >= eh*60+em) return "done";
    return "upcoming";
  } catch { return "upcoming"; }
}

// Excel 數字時間 → "HH:MM"
function excelNumToTime(val) {
  if (val === null || val === undefined || val === "") return "";
  if (typeof val === "string") {
    // 已是 HH:MM 或 HH:MM:SS 格式
    const m = val.trim().match(/^(\d{1,2}):(\d{2})/);
    if (m) return `${String(m[1]).padStart(2,"0")}:${m[2]}`;
    return val.trim();
  }
  if (typeof val === "number") {
    const totalMin = Math.round(val * 24 * 60);
    const h = Math.floor(totalMin / 60) % 24;
    const mn = totalMin % 60;
    return `${String(h).padStart(2,"0")}:${String(mn).padStart(2,"0")}`;
  }
  return String(val);
}

// Excel 日期 → "YYYY-MM-DD"
function excelToDate(val) {
  if (!val) return null;
  if (typeof val === "string") {
    const cleaned = val.replace(/\//g, "-").trim();
    const m = cleaned.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);
    if (m) return `${m[1]}-${String(m[2]).padStart(2,"0")}-${String(m[3]).padStart(2,"0")}`;
  }
  if (typeof val === "number") {
    try {
      const d = XLSX.SSF.parse_date_code(val);
      if (d) return `${d.y}-${String(d.m).padStart(2,"0")}-${String(d.d).padStart(2,"0")}`;
    } catch {}
  }
  return null;
}

async function loadRoomData(roomId) {
  try {
    const db = firebase.database();
    const snap = await db.ref(`schedules/${roomId}`).get();
    if (snap.exists()) return snap.val();
  } catch(e) { console.error("load error", e); }
  return {};
}
async function saveRoomData(roomId, data) {
  try {
    const db = firebase.database();
    await db.ref(`schedules/${roomId}`).set(data);
  } catch(e) { console.error("save error", e); }
}

// ── 日期選擇器 ────────────────────────────────────────
function DatePicker({ selected, onChange, markedDates, accentColor }) {
  const dates = [];
  for (let i = -7; i <= 90; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    dates.push(d.toISOString().slice(0, 10));
  }
  return (
    <div style={{ overflowX:"auto", padding:"10px 16px 2px" }}>
      <div style={{ display:"flex", gap:8, width:"max-content" }}>
        {dates.map((d) => {
          const sel = d === selected, tod = d === todayStr();
          const [,m,day] = d.split("-");
          const dow = ["日","一","二","三","四","五","六"][new Date(d).getDay()];
          const hasMark = !!(markedDates && markedDates[d] && markedDates[d].length);
          return (
            <div key={d} onClick={() => onChange(d)} style={{
              minWidth:52, textAlign:"center", padding:"8px 4px", borderRadius:12,
              cursor:"pointer", userSelect:"none",
              background: sel ? accentColor : tod ? accentColor+"22" : "#fff",
              color: sel ? "#fff" : tod ? accentColor : "#666",
              border:`2px solid ${sel ? accentColor : tod ? accentColor+"55" : "#e8e8e8"}`,
              boxShadow: sel ? `0 4px 14px ${accentColor}44` : "none",
            }}>
              <div style={{ fontSize:10, opacity:0.8 }}>{parseInt(m)}/{parseInt(day)}</div>
              <div style={{ fontSize:13, fontWeight:sel?700:400 }}>週{dow}</div>
              <div style={{ width:5, height:5, borderRadius:"50%", margin:"3px auto 0", background: hasMark ? (sel?"#fff":accentColor) : "transparent" }}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function HomePage({ onRoomSelect, onAdminClick }) {
  const [allData, setAllData] = React.useState({});
  const [now, setNow] = React.useState(new Date());
  const today = todayStr();

  React.useEffect(() => {
    (async () => {
      const obj = {};
      for (const r of ROOMS) { obj[r.id] = await loadRoomData(r.id); }
      setAllData(obj);
    })();
    const t = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(t);
  }, []);

  function getRoomStatus(roomId) {
    const rows = allData[roomId]?.[today] || [];
    for (const row of rows) {
      if (getTimeStatus(row.time) === "using") return { using:true, content:row.content };
    }
    return { using:false };
  }

  return (
    <div style={{ minHeight:"100vh", background:"#f4f6f9", fontFamily:"'Noto Sans TC',sans-serif" }}>
      <div style={{ background:"linear-gradient(135deg,#1a3a5c,#1e5799)", color:"#fff", padding:"20px 20px 18px", position:"relative" }}>
        <div style={{ fontSize:11, opacity:0.7 }}>{HOSPITAL_NAME}</div>
        <div style={{ fontSize:21, fontWeight:700, letterSpacing:2, margin:"4px 0 2px" }}>會議室排程查詢</div>
        <div style={{ fontSize:12, opacity:0.75 }}>🕐 {formatDate(today)} {now.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false})}</div>
        <div onClick={onAdminClick} style={{ position:"absolute", right:16, top:20, background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)", borderRadius:8, padding:"6px 14px", fontSize:12, cursor:"pointer" }}>⚙ 後台管理</div>
      </div>

      <div style={{ padding:"14px 16px 8px" }}>
        <div style={{ fontSize:11, color:"#aaa", fontWeight:700, letterSpacing:1, marginBottom:10 }}>TODAY · 今日即時狀況</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          {ROOMS.map((room) => {
            const s = getRoomStatus(room.id);
            return (
              <div key={room.id} onClick={() => onRoomSelect(room.id)} style={{ background:"#fff", borderRadius:14, padding:"12px 14px", cursor:"pointer", borderLeft:`4px solid ${room.color}`, boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
                <div style={{ fontSize:11, color:room.color, fontWeight:700 }}>{room.icon} {room.name}</div>
                {s.using
                  ? <><div style={{ marginTop:5, fontSize:11, color:"#fff", background:room.color, borderRadius:6, padding:"2px 8px", display:"inline-block" }}>● 使用中</div>
                      <div style={{ fontSize:11, color:"#555", marginTop:3, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.content}</div></>
                  : <div style={{ marginTop:5, fontSize:11, color:"#bbb" }}>空閒中</div>
                }
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ padding:"8px 16px 32px" }}>
        <div style={{ fontSize:11, color:"#aaa", fontWeight:700, letterSpacing:1, marginBottom:12 }}>QR CODE · 掃碼查看各會議室排程</div>
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
          {ROOMS.map((room) => (
            <div key={room.id} onClick={() => onRoomSelect(room.id)} style={{ background:"#fff", borderRadius:18, padding:"16px 12px", textAlign:"center", cursor:"pointer", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", border:`2px solid ${room.light}` }}>
              <div style={{ fontSize:12, fontWeight:700, color:room.color, marginBottom:10 }}>{room.icon} {room.name}</div>
              <div style={{ background:room.light, borderRadius:12, padding:8, display:"inline-block", marginBottom:6 }}>
                <img src={qrUrl(room.id)} alt="QR" style={{ width:100, height:100, display:"block", borderRadius:6 }}/>
              </div>
              <div style={{ fontSize:10, color:"#bbb" }}>點擊查看排程</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ textAlign:"center", padding:"0 0 20px", fontSize:11, color:"#ccc" }}>{DEPT_NAME} · 節能減碳無紙化</div>
    </div>
  );
}

// 單室排程頁
// ══════════════════════════════════════════════════════
function RoomPage({ roomId, onBack }) {
  const room = getRoomById(roomId);
  const today = todayStr();
  const [selectedDate, setSelectedDate] = React.useState(today);
  const [roomData, setRoomData] = React.useState({});
  const [now, setNow] = React.useState(new Date());

  React.useEffect(() => {
    loadRoomData(roomId).then(setRoomData);
    const t = setInterval(() => setNow(new Date()), 30000);
    return () => clearInterval(t);
  }, [roomId]);

  const rows = roomData[selectedDate] || [];
  const isToday = selectedDate === today;
  const statusLabel = { using:"使用中", done:"已結束", upcoming:"即將使用" };

  return (
    <div style={{ minHeight:"100vh", background:room.light, fontFamily:"'Noto Sans TC',sans-serif" }}>
      {/* Header */}
      <div style={{ background:`linear-gradient(135deg,${room.color}cc,${room.color})`, color:"#fff", padding:"20px 20px 22px" }}>
        <div onClick={onBack} style={{ fontSize:12, opacity:0.75, cursor:"pointer", marginBottom:12, display:"inline-block" }}>← 返回總覽</div>
        <div style={{ fontSize:26, fontWeight:700, letterSpacing:2 }}>{room.icon} {room.name}</div>
        <div style={{ fontSize:12, opacity:0.8, marginTop:4 }}>{HOSPITAL_NAME}</div>
      </div>

      {/* 日期 + 即時時間 */}
      <div style={{ background:"#fff", borderBottom:`3px solid ${room.color}33`, padding:"10px 20px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div style={{ fontSize:13, color:"#666", fontWeight:600 }}>📅 {formatDate(selectedDate)}</div>
        {isToday && (
          <div style={{ fontSize:13, color:room.color, fontWeight:700 }}>
            🕐 {now.toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit",hour12:false})}
          </div>
        )}
      </div>

      {/* 日期選擇器 */}
      <DatePicker selected={selectedDate} onChange={setSelectedDate} markedDates={roomData} accentColor={room.color}/>

      {/* 排程列表 */}
      <div style={{ padding:"16px 16px 40px" }}>
        {rows.length === 0 ? (
          <div style={{ background:"#fff", borderRadius:18, padding:"52px 20px", textAlign:"center", color:"#bbb", boxShadow:"0 2px 12px rgba(0,0,0,0.06)" }}>
            <div style={{ fontSize:44, marginBottom:12 }}>📋</div>
            <div style={{ fontSize:16, fontWeight:600 }}>今日無排程</div>
            <div style={{ fontSize:12, marginTop:8, color:"#ccc" }}>{DEPT_NAME}</div>
          </div>
        ) : rows.map((row, idx) => {
          const status = isToday ? getTimeStatus(row.time) : "upcoming";
          const isUsing = status==="using", isDone = status==="done";

          if (isUsing) {
            return (
              <div key={row.id} style={{ marginBottom:16 }}>
                <style>{`@keyframes pulse_${room.id} { 0%,100%{box-shadow:0 0 0 4px ${room.color}33} 50%{box-shadow:0 0 0 10px ${room.color}11} }`}</style>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, paddingLeft:4 }}>
                  <div style={{ width:10, height:10, borderRadius:"50%", background:room.color, animation:`pulse_${room.id} 1.5s ease-in-out infinite` }}/>
                  <span style={{ fontSize:12, fontWeight:700, color:room.color, letterSpacing:1 }}>正在使用中</span>
                </div>
                <div style={{
                  background:`linear-gradient(135deg, ${room.color}ee, ${room.color})`,
                  borderRadius:20, padding:"22px 20px",
                  boxShadow:`0 8px 32px ${room.color}55`,
                  color:"#fff", position:"relative", overflow:"hidden"
                }}>
                  <div style={{ position:"absolute", right:-20, top:-20, width:110, height:110, borderRadius:"50%", background:"rgba(255,255,255,0.1)" }}/>
                  <div style={{ position:"absolute", right:20, bottom:-30, width:80, height:80, borderRadius:"50%", background:"rgba(255,255,255,0.07)" }}/>
                  <div style={{ fontSize:22, fontWeight:800, marginBottom:10, lineHeight:1.3, position:"relative" }}>{row.content}</div>
                  <div style={{ fontSize:16, fontWeight:600, opacity:0.95, marginBottom:6, position:"relative" }}>🕐 {row.time}</div>
                  {row.unit && <div style={{ fontSize:14, opacity:0.85, position:"relative" }}>🏢 {row.unit}</div>}
                  {row.note && <div style={{ fontSize:13, opacity:0.75, marginTop:4, position:"relative" }}>📝 {row.note}</div>}
                </div>
              </div>
            );
          }

          return (
            <div key={row.id} style={{ display:"flex", gap:12, marginBottom:12 }}>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"center", width:20 }}>
                <div style={{ width:12, height:12, borderRadius:"50%", flexShrink:0,
                  background: isDone?"#ddd":"#fff",
                  border:`3px solid ${isDone?"#ddd":room.color+"55"}`,
                  marginTop:16, zIndex:1 }}/>
                {idx < rows.length-1 && <div style={{ flex:1, width:2, background:"#e0e0e0", marginTop:2 }}/>}
              </div>
              <div style={{ flex:1, background:"#fff", borderRadius:16, padding:"14px 16px",
                boxShadow:"0 2px 8px rgba(0,0,0,0.05)",
                border:"2px solid transparent",
                opacity:isDone?0.5:1
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:15, fontWeight:700, color:isDone?"#aaa":"#333", marginBottom:4 }}>{row.content}</div>
                    <div style={{ fontSize:13, color:isDone?"#ccc":room.color, fontWeight:600 }}>🕐 {row.time}</div>
                    {row.unit && <div style={{ fontSize:12, color:"#aaa", marginTop:3 }}>🏢 {row.unit}</div>}
                    {row.note && <div style={{ fontSize:12, color:"#ccc", marginTop:2 }}>📝 {row.note}</div>}
                  </div>
                  {isToday && (
                    <span style={{
                      background: isDone?"#f0f0f0":room.light,
                      color: isDone?"#bbb":room.color,
                      padding:"4px 10px", borderRadius:20, fontSize:11, fontWeight:700,
                      whiteSpace:"nowrap", marginLeft:8
                    }}>
                      {statusLabel[status]}
                    </span>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ textAlign:"center", padding:"0 0 24px", fontSize:11, color:"#bbb" }}>
        {DEPT_NAME} · 節能減碳無紙化
      </div>
    </div>
  );
}

function LoginPage({ onLogin, onBack }) {
  const [pw, setPw] = React.useState("");
  const [err, setErr] = React.useState("");
  function submit() {
    if (pw === ADMIN_PASSWORD) { setErr(""); onLogin(); }
    else { setErr("密碼錯誤，請重試"); setPw(""); }
  }
  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#1a3a5c,#0d2440)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'Noto Sans TC',sans-serif", padding:20 }}>

        <div style={{ textAlign:"center", marginBottom:28 }}>
          <div style={{ fontSize:44, marginBottom:10 }}>🔐</div>
          <div style={{ fontSize:18, fontWeight:700, color:"#1a3a5c" }}>後台管理系統</div>
          <div style={{ fontSize:12, color:"#aaa", marginTop:4 }}>{HOSPITAL_NAME} 會議室排程</div>
        </div>
        <div style={{ marginBottom:18 }}>
          <label style={{ fontSize:12, color:"#666", fontWeight:600, display:"block", marginBottom:6 }}>管理員密碼</label>
          <input type="password" value={pw}
            onChange={(e) => { setPw(e.target.value); setErr(""); }}
            onKeyDown={(e) => e.key==="Enter" && submit()}
            placeholder="請輸入密碼" autoComplete="current-password"
            style={{ display:"block", width:"100%", padding:"12px 16px", fontSize:15, border:`2px solid ${err?"#e53935":"#e0e0e0"}`, borderRadius:12, outline:"none", boxSizing:"border-box", fontFamily:"inherit" }}
          />
          {err && <div style={{ color:"#e53935", fontSize:13, marginTop:6, padding:"6px 10px", background:"#ffebee", borderRadius:8 }}>⚠ {err}</div>}
        </div>
        <button onClick={submit} style={{ width:"100%", padding:14, background:"#1e5799", color:"#fff", border:"none", borderRadius:12, fontSize:15, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>登入</button>
        <div onClick={onBack} style={{ textAlign:"center", marginTop:18, fontSize:13, color:"#aaa", cursor:"pointer" }}>← 返回排程查詢</div>
      </div>
    </div>
  );
}

// Excel 匯入 Modal

function ExcelImportModal({ room, selectedDate, onClose, onImport }) {
  const fileRef = React.useRef();
  const [preview, setPreview] = React.useState(null);
  const [importDate, setImportDate] = React.useState(selectedDate);
  const [error, setError] = React.useState("");
  const [mode, setMode] = React.useState("replace");

  // Excel 欄位說明
  const EXPECTED_COLS = [
    { label:"序號",       keys:["序號"] },
    { label:"借用日",     keys:["借用日","日期","使用日期"] },
    { label:"開始時",     keys:["開始時","開始時間","start"] },
    { label:"結束時",     keys:["結束時","結束時間","end"] },
    { label:"主辦單位",   keys:["主辦單位","使用單位","單位"] },
    { label:"活動內容說明", keys:["活動內容說明","活動內容","內容","活動"] },
  ];

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setError(""); setPreview(null);
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type:"binary", cellDates:false });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const raw = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });

        // 找標題列（前 6 列中找包含關鍵字的那列）
        let headerIdx = 0;
        for (let i = 0; i < Math.min(6, raw.length); i++) {
          const s = raw[i].join("").replace(/\s/g,"");
          if (s.includes("借用日") || s.includes("開始時") || s.includes("序號") || s.includes("活動內容")) {
            headerIdx = i;
            break;
          }
        }

        const headers = raw[headerIdx].map(h => String(h).replace(/\s/g,"").trim());

        // 依關鍵字清單找欄位 index
        function findCol(keys) {
          for (const key of keys) {
            const i = headers.findIndex(h => h.includes(key));
            if (i !== -1) return i;
          }
          return -1;
        }

        const colDate    = findCol(["借用日","日期","使用日期"]);
        const colStart   = findCol(["開始時","開始時間","start"]);
        const colEnd     = findCol(["結束時","結束時間","end"]);
        const colUnit    = findCol(["主辦單位","使用單位","單位"]);
        const colContent = findCol(["活動內容說明","活動內容","內容","活動"]);
        const colNote    = findCol(["備註"]);

        // 必要欄位檢查
        const missing = [];
        if (colStart === -1)   missing.push("開始時");
        if (colEnd === -1)     missing.push("結束時");
        if (colContent === -1) missing.push("活動內容說明");
        if (missing.length > 0) {
          setError(`找不到欄位：「${missing.join("」、「")}」，請確認 Excel 標題列格式正確。`);
          return;
        }

        // 從第一筆資料偵測日期
        let detectedDate = null;
        if (colDate !== -1) {
          for (let i = headerIdx+1; i < raw.length; i++) {
            const d = excelToDate(raw[i][colDate]);
            if (d) { detectedDate = d; break; }
          }
        }
        if (detectedDate) setImportDate(detectedDate);

        // 解析每一列資料
        const dataRows = [];
        for (let i = headerIdx+1; i < raw.length; i++) {
          const row = raw[i];
          const content = String(row[colContent] || "").trim();
          if (!content) continue;

          const startTime = excelNumToTime(row[colStart]);
          const endTime   = excelNumToTime(row[colEnd]);
          if (!startTime || !endTime) continue;

          const timeStr = `${startTime} - ${endTime}`;

          dataRows.push({
            id: i,
            time: timeStr,
            content,
            unit: colUnit !== -1 ? String(row[colUnit] || "").trim() : "",
            note: colNote !== -1 ? String(row[colNote] || "").trim() : "",
          });
        }

        if (dataRows.length === 0) {
          setError("未讀取到任何有效資料，請確認內容是否正確填寫。");
          return;
        }
        setPreview({ rows:dataRows, detectedDate });
      } catch (err) {
        setError("讀取失敗：" + err.message);
      }
    };
    reader.readAsBinaryString(file);
  }

  function handleConfirm() {
    if (!preview) return;
    const newRows = preview.rows.map((r, idx) => ({ ...r, id:idx+1 }));
    onImport(importDate, newRows, mode);
  }

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:999 }}
      onClick={(e) => e.target===e.currentTarget && onClose()}>
      <div style={{ background:"#fff", borderRadius:"22px 22px 0 0", padding:"20px 20px 36px", width:"100%", maxWidth:520, maxHeight:"92vh", overflowY:"auto" }}>
        <div style={{ width:36, height:4, background:"#e0e0e0", borderRadius:2, margin:"0 auto 18px", cursor:"pointer" }} onClick={onClose}/>
        <div style={{ fontSize:16, fontWeight:700, color:room.color, marginBottom:4 }}>📥 Excel 匯入排程</div>
        <div style={{ fontSize:12, color:"#888", marginBottom:16 }}>{room.icon} {room.name}</div>

        {/* 欄位格式說明 */}
        <div style={{ background:"#f8f9fa", borderRadius:12, padding:"14px", marginBottom:16, border:"1px solid #e8e8e8" }}>
          <div style={{ fontSize:12, fontWeight:700, color:"#555", marginBottom:10 }}>📋 Excel 欄位格式（第一列為標題）</div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:6 }}>
            {["序號","借用日","開始時","結束時","主辦單位","活動內容說明"].map((col, i) => (
              <div key={i} style={{
                background:"#fff", borderRadius:8, padding:"7px 6px",
                textAlign:"center", border:`2px solid ${room.color}55`,
                fontSize:11, color:room.color, fontWeight:700,
                gridColumn: col==="活動內容說明" ? "1 / -1" : "auto"
              }}>{col}</div>
            ))}
          </div>
          <div style={{ fontSize:11, color:"#aaa", marginTop:10, lineHeight:1.7 }}>
            ✅ <strong>開始時</strong> / <strong>結束時</strong>：會自動合併為「09:30 - 11:30」格式<br/>
            ✅ <strong>借用日</strong>：有此欄會自動辨識日期<br/>
            ✅ 可加「備註」欄（選填）
          </div>
        </div>

        {/* 選擇檔案 */}
        <div onClick={() => fileRef.current && fileRef.current.click()} style={{
          border:`2px dashed ${room.color}88`, borderRadius:14, padding:"24px 16px",
          textAlign:"center", cursor:"pointer", marginBottom:16, background:room.light
        }}>
          <div style={{ fontSize:32, marginBottom:8 }}>📂</div>
          <div style={{ fontSize:14, fontWeight:600, color:room.color }}>點此選擇 Excel 檔案</div>
          <div style={{ fontSize:11, color:"#aaa", marginTop:4 }}>支援 .xlsx / .xls 格式</div>
          <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFile} style={{ display:"none" }}/>
        </div>

        {error && (
          <div style={{ background:"#ffebee", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#c62828", lineHeight:1.6 }}>⚠ {error}</div>
        )}

        {preview && (
          <>
            <div style={{ background:"#e8f5e9", borderRadius:10, padding:"10px 14px", marginBottom:14, fontSize:13, color:"#2e7d32" }}>
              ✅ 成功讀取 <strong>{preview.rows.length}</strong> 筆資料
              {preview.detectedDate && <span>，偵測到借用日：<strong>{formatDate(preview.detectedDate)}</strong></span>}
            </div>

            {/* 匯入日期 */}
            <div style={{ marginBottom:14 }}>
              <label style={{ fontSize:12, color:"#555", fontWeight:600, display:"block", marginBottom:6 }}>匯入至日期（可修改）</label>
              <input type="date" value={importDate} onChange={(e) => setImportDate(e.target.value)}
                style={{ padding:"10px 14px", border:"2px solid #e8e8e8", borderRadius:10, fontSize:14, outline:"none", fontFamily:"inherit", width:"100%", boxSizing:"border-box" }}/>
            </div>

            {/* 匯入方式 */}
            <div style={{ marginBottom:16 }}>
              <label style={{ fontSize:12, color:"#555", fontWeight:600, display:"block", marginBottom:8 }}>匯入方式</label>
              <div style={{ display:"flex", gap:10 }}>
                {[["replace","取代當日排程"],["append","附加到現有排程"]].map(([v, label]) => (
                  <div key={v} onClick={() => setMode(v)} style={{
                    flex:1, padding:"10px 8px", borderRadius:10, cursor:"pointer", textAlign:"center",
                    border:`2px solid ${mode===v ? room.color : "#e0e0e0"}`,
                    background: mode===v ? room.light : "#fff",
                    color: mode===v ? room.color : "#888",
                    fontSize:12, fontWeight: mode===v ? 700 : 400
                  }}>
                    {mode===v ? "✓ " : ""}{label}
                  </div>
                ))}
              </div>
            </div>

            {/* 預覽表格 */}
            <div style={{ fontSize:12, color:"#666", fontWeight:600, marginBottom:8 }}>預覽內容</div>
            <div style={{ border:"1px solid #e8e8e8", borderRadius:12, overflow:"hidden", marginBottom:18 }}>
              <div style={{ overflowX:"auto" }}>
                <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
                  <thead>
                    <tr style={{ background:room.color, color:"#fff" }}>
                      {["#","時間","活動內容說明","主辦單位"].map(h => (
                        <th key={h} style={{ padding:"8px 10px", textAlign:"left", fontWeight:600, whiteSpace:"nowrap" }}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {preview.rows.map((row, idx) => (
                      <tr key={idx} style={{ borderTop:"1px solid #f0f0f0", background:idx%2===0?"#fff":"#fafafa" }}>
                        <td style={{ padding:"7px 10px", color:"#aaa" }}>{idx+1}</td>
                        <td style={{ padding:"7px 10px", whiteSpace:"nowrap" }}>{row.time}</td>
                        <td style={{ padding:"7px 10px" }}>{row.content}</td>
                        <td style={{ padding:"7px 10px", color:"#888", whiteSpace:"nowrap" }}>{row.unit}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div style={{ display:"flex", gap:10 }}>
              <button onClick={onClose} style={{ flex:1, padding:13, background:"#f5f5f5", border:"none", borderRadius:12, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>取消</button>
              <button onClick={handleConfirm} style={{ flex:2, padding:13, background:room.color, color:"#fff", border:"none", borderRadius:12, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>
                確認匯入 {preview.rows.length} 筆
              </button>
            </div>
          </>
        )}

        {!preview && !error && (
          <div onClick={onClose} style={{ textAlign:"center", fontSize:13, color:"#aaa", cursor:"pointer" }}>取消</div>
        )}
      </div>
    </div>
  );
}

function AdminField({ label, k, form, setForm, placeholder, required, accentColor }) {
  return (
    <div style={{ marginBottom:14 }}>
      <label style={{ fontSize:12, color:"#555", fontWeight:600, display:"block", marginBottom:5 }}>
        {label}{required && <span style={{ color:"#e53935" }}> *</span>}
      </label>
      <input
        value={form[k]}
        onChange={(e) => setForm(prev => ({...prev, [k]:e.target.value}))}
        placeholder={placeholder}
        style={{ width:"100%", padding:"10px 14px", border:"2px solid #e8e8e8", borderRadius:10, fontSize:14, outline:"none", boxSizing:"border-box", fontFamily:"inherit" }}
        onFocus={(e) => e.target.style.borderColor=accentColor}
        onBlur={(e) => e.target.style.borderColor="#e8e8e8"}
      />
    </div>
  );
}

function AdminPage({ onLogout }) {
  const [activeRoom, setActiveRoom] = React.useState(ROOMS[0].id);
  const [roomData, setRoomData] = React.useState({});
  const [selectedDate, setSelectedDate] = React.useState(todayStr());
  const [modal, setModal] = React.useState(null);
  const [form, setForm] = React.useState({ time:"", content:"", unit:"", note:"" });
  const [showQR, setShowQR] = React.useState(false);
  const [showImport, setShowImport] = React.useState(false);
  const [toast, setToast] = React.useState(null);

  const room = getRoomById(activeRoom);

  React.useEffect(() => {
    loadRoomData(activeRoom).then(setRoomData);
    setSelectedDate(todayStr());
    setModal(null);
    setShowQR(false);
    setShowImport(false);
  }, [activeRoom]);

  const rows = roomData[selectedDate] || [];

  function showToast(msg) { setToast(msg); setTimeout(() => setToast(null), 3000); }
  async function persist(nd) { setRoomData(nd); await saveRoomData(activeRoom, nd); }
  function openNew() { setForm({ time:"", content:"", unit:"", note:"" }); setModal({ mode:"new" }); }
  function openEdit(row) { setForm({ time:row.time, content:row.content, unit:row.unit||"", note:row.note||"" }); setModal({ mode:"edit", row }); }

  async function handleSave() {
    if (!form.time.trim() || !form.content.trim()) { alert("時間與內容為必填！"); return; }
    const nd = { ...roomData };
    if (!nd[selectedDate]) nd[selectedDate] = [];
    if (modal.mode === "new") {
      const maxId = nd[selectedDate].length ? Math.max(...nd[selectedDate].map(r=>r.id)) : 0;
      nd[selectedDate] = [...nd[selectedDate], { id:maxId+1, ...form }];
    } else {
      nd[selectedDate] = nd[selectedDate].map((r) => r.id===modal.row.id ? { ...r, ...form } : r);
    }
    await persist(nd);
    setModal(null);
    showToast("✅ 儲存成功");
  }

  async function handleDelete(id) {
    if (!confirm("確定刪除？")) return;
    const nd = { ...roomData };
    nd[selectedDate] = (nd[selectedDate]||[]).filter(r=>r.id!==id);
    await persist(nd);
    showToast("已刪除");
  }

  async function move(idx, dir) {
    const arr = [...(roomData[selectedDate]||[])];
    const t = idx+dir;
    if (t<0||t>=arr.length) return;
    [arr[idx],arr[t]]=[arr[t],arr[idx]];
    await persist({ ...roomData, [selectedDate]:arr });
  }

  async function handleImport(date, newRows, importMode) {
    const nd = { ...roomData };
    if (importMode === "append") {
      const existing = nd[date] || [];
      const maxId = existing.length ? Math.max(...existing.map(r=>r.id)) : 0;
      nd[date] = [...existing, ...newRows.map((r,i) => ({ ...r, id:maxId+i+1 }))];
    } else {
      nd[date] = newRows;
    }
    await persist(nd);
    setSelectedDate(date);
    setShowImport(false);
    showToast(`✅ 成功匯入 ${newRows.length} 筆到 ${formatDate(date)}`);
  }



  return (
    <div style={{ minHeight:"100vh", background:"#f4f6f9", fontFamily:"'Noto Sans TC',sans-serif" }}>
      {toast && (
        <div style={{ position:"fixed", top:16, left:"50%", transform:"translateX(-50%)", background:"#2e7d32", color:"#fff", padding:"10px 20px", borderRadius:12, fontSize:13, fontWeight:600, zIndex:9999, boxShadow:"0 4px 20px rgba(0,0,0,0.25)", whiteSpace:"nowrap" }}>
          {toast}
        </div>
      )}

      <div style={{ background:"linear-gradient(135deg,#1a3a5c,#1e5799)", color:"#fff", padding:"14px 18px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:10, opacity:0.7 }}>後台管理 · {HOSPITAL_NAME}</div>
          <div style={{ fontSize:16, fontWeight:700 }}>會議室排程管理</div>
        </div>
        <button onClick={onLogout} style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.3)", color:"#fff", padding:"6px 14px", borderRadius:8, cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>登出</button>
      </div>

      <div style={{ background:"#fff", borderBottom:"1px solid #eee", overflowX:"auto" }}>
        <div style={{ display:"flex", width:"max-content" }}>
          {ROOMS.map((r) => (
            <div key={r.id} onClick={() => setActiveRoom(r.id)} style={{ padding:"12px 16px", cursor:"pointer", fontSize:13, fontWeight:600, borderBottom: activeRoom===r.id ? `3px solid ${r.color}` : "3px solid transparent", color: activeRoom===r.id ? r.color : "#888", whiteSpace:"nowrap" }}>
              {r.icon} {r.name}
            </div>
          ))}
        </div>
      </div>

      <div style={{ padding:"12px 16px 4px" }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
          <div style={{ fontSize:14, fontWeight:700, color:room.color }}>{room.icon} {room.name}</div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={() => setShowImport(true)} style={{ background:"#e8f5e9", border:"1px solid #a5d6a7", color:"#2e7d32", padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:12, fontFamily:"inherit", fontWeight:600 }}>
              📥 Excel 匯入
            </button>
            <button onClick={() => setShowQR(!showQR)} style={{ background:room.light, border:`1px solid ${room.color}44`, color:room.color, padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:12, fontFamily:"inherit" }}>
              {showQR ? "收起 QR" : "🔳 QR Code"}
            </button>
          </div>
        </div>
        {showQR && (
          <div style={{ background:"#fff", borderRadius:16, padding:20, textAlign:"center", marginTop:10, boxShadow:"0 2px 12px rgba(0,0,0,0.08)" }}>
            <img src={qrUrl(activeRoom)} alt="QR Code" style={{ width:160, height:160, borderRadius:8 }}/>
            <div style={{ fontSize:12, color:"#888", marginTop:8 }}>員工掃碼可直接查看此會議室排程</div>
          </div>
        )}
      </div>

      <DatePicker selected={selectedDate} onChange={(d) => { setSelectedDate(d); setModal(null); }} markedDates={roomData} accentColor={room.color}/>
      <div style={{ padding:"4px 18px 10px", fontSize:13, color:"#666", fontWeight:600 }}>📅 {formatDate(selectedDate)}</div>

      <div style={{ padding:"0 16px 16px" }}>
        {rows.length === 0
          ? <div style={{ background:"#fff", borderRadius:16, padding:"28px 20px", textAlign:"center", color:"#bbb", marginBottom:12 }}>
              <div style={{ fontSize:32, marginBottom:8 }}>📋</div>
              <div>當日無排程</div>
              <div style={{ fontSize:12, marginTop:6, color:"#ccc" }}>可手動新增或使用 Excel 匯入</div>
            </div>
          : <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:12 }}>
              {rows.map((row, idx) => (
                <div key={row.id} style={{ background:"#fff", borderRadius:14, padding:"13px 14px", boxShadow:"0 2px 8px rgba(0,0,0,0.06)", borderLeft:`4px solid ${room.color}` }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:"#333" }}>{row.content}</div>
                      <div style={{ fontSize:12, color:room.color, marginTop:2 }}>🕐 {row.time}</div>
                      {row.unit && <div style={{ fontSize:11, color:"#888" }}>🏢 {row.unit}</div>}

              {modal.mode==="new" ? "＋ 新增排程" : "✏ 編輯排程"} — {room.name}
            </div>
            <AdminField label="時間" k="time" form={form} setForm={setForm} placeholder="例：09:30 - 11:30" required accentColor={room.color}/>
            <AdminField label="活動內容說明" k="content" form={form} setForm={setForm} placeholder="例：志工教育訓練" required accentColor={room.color}/>
            <AdminField label="主辦單位" k="unit" form={form} setForm={setForm} placeholder="例：志工室" accentColor={room.color}/>
            <AdminField label="備註" k="note" form={form} setForm={setForm} placeholder="選填" accentColor={room.color}/>
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={() => setModal(null)} style={{ flex:1, padding:13, background:"#f5f5f5", border:"none", borderRadius:12, fontSize:14, cursor:"pointer", fontFamily:"inherit" }}>取消</button>
              <button onClick={handleSave} style={{ flex:2, padding:13, background:room.color, color:"#fff", border:"none", borderRadius:12, fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>儲存</button>
            </div>
          </div>
        </div>
      )}

      {showImport && (
        <ExcelImportModal room={room} selectedDate={selectedDate} onClose={() => setShowImport(false)} onImport={handleImport}/>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════
// App Root
// ══════════════════════════════════════════════════════
function App() {
  const [page, setPage] = React.useState("home");
  const [activeRoom, setActiveRoom] = React.useState(null);
  return (
    <>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet"/>
      {page==="home"  && <HomePage onRoomSelect={(id) => { setActiveRoom(id); setPage("room"); }} onAdminClick={() => setPage("login")}/>}
      {page==="room"  && <RoomPage roomId={activeRoom} onBack={() => setPage("home")}/>}
      {page==="login" && <LoginPage onLogin={() => setPage("admin")} onBack={() => setPage("home")}/>}
      {page==="admin" && <AdminPage onLogout={() => setPage("home")}/>}
    </>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
